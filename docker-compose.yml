version: "3.9"

services:

  api:

    build: .

    container_name: blog-api

    restart: always

    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      - mongodb

    volumes:
      - .:/app
      - /app/node_modules

  mongodb:

    image: mongo:8

    container_name: mongodb

    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: